apiVersion: v1
kind: ConfigMap
metadata:
  name: rizquna-config
  namespace: rizquna-erp
data:
  APP_NAME: "Rizquna ERP"
  APP_ENV: "production"
  APP_TIMEZONE: "Asia/Jakarta"
  DB_CONNECTION: "pgsql"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_DATABASE: "rizquna_erp"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  CACHE_STORE: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
