apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rizquna-ingress
  namespace: rizquna-erp
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - rizquna.id
    - www.rizquna.id
    - admin.rizquna.id
    secretName: rizquna-tls
  rules:
  - host: rizquna.id
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rizquna-web-service
            port:
              number: 80
  - host: www.rizquna.id
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rizquna-web-service
            port:
              number: 80
  - host: admin.rizquna.id
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rizquna-admin-service
            port:
              number: 80
