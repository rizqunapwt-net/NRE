server {
    listen 80;
    server_name rizquna.id;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

server {
    listen 443 ssl;
    server_name rizquna.id;

    # SSL certificates from Let's Encrypt
    ssl_certificate /etc/nginx/ssl/live/rizquna.id/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/rizquna.id/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 200M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Static assets: Cache-Control 1y immutable
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm|wav|mp3|m4a|aac|ogg|pdf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # API and PHP files
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # SPA support (as requested, serve from /public/build if needed, but standard Laravel SPA uses try_files)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Admin Panel (if separate SPA as seen in default.conf)
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # Health check for Docker
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location ~ /\.ht {
        deny all;
    }
}
