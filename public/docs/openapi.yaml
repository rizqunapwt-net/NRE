openapi: 3.0.3
info:
  title: 'Rizquna ERP API Reference'
  description: 'OpenAPI reference for the Rizquna Publishing platform, author portal, digital library, and administration APIs.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:9000'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Protected endpoints require a Laravel Sanctum bearer token in the <code>Authorization</code> header.'
security:
  -
    default: []
paths:
  /api/documentation:
    get:
      summary: 'Handles the API request and renders the Swagger documentation view.'
      operationId: handlesTheAPIRequestAndRendersTheSwaggerDocumentationView
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/oauth2-callback:
    get:
      summary: 'Handles the OAuth2 callback and retrieves the required file for the redirect.'
      operationId: handlesTheOAuth2CallbackAndRetrievesTheRequiredFileForTheRedirect
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/v1/health:
    get:
      summary: 'Simple health check endpoint'
      operationId: simpleHealthCheckEndpoint
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/v1/ready:
    get:
      summary: 'Detailed health check with dependencies'
      operationId: detailedHealthCheckWithDependencies
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/v1/live:
    get:
      summary: 'Liveness probe for Kubernetes/Docker'
      operationId: livenessProbeForKubernetesDocker
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/v1/webhooks/payment:
    post:
      summary: "POST /api/v1/webhooks/payment\nCallback dari payment gateway (Midtrans/Xendit)."
      operationId: pOSTapiv1webhookspaymentCallbackDariPaymentGatewayMidtransXendit
      description: 'Middleware: verify.webhook:midtrans atau verify.webhook:xendit'
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/v1/auth/login:
    post:
      summary: "API Login - Returns token for SPA/Mobile\nAccepts: email, username, or login (auto-detect)"
      operationId: aPILoginReturnsTokenForSPAMobileAcceptsEmailUsernameOrLoginautoDetect
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/v1/auth/register:
    post:
      summary: 'Register a new user'
      operationId: registerANewUser
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '-0pBNvYgxw'
                phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: aykcmyuwpwlvqwrs
                  nullable: true
              required:
                - name
                - email
                - password
      security: []
  /api/v1/auth/forgot-password:
    post:
      summary: 'Send password reset link'
      operationId: sendPasswordResetLink
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
              required:
                - email
      security: []
  /api/v1/auth/reset-password:
    post:
      summary: 'Reset password'
      operationId: resetPassword
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: ''
                  example: architecto
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '-0pBNvYgxw'
              required:
                - token
                - email
                - password
      security: []
  /api/v1/authors/register:
    post:
      summary: 'POST /api/v1/authors/register'
      operationId: pOSTapiv1authorsregister
      description: "Register a new author with complete profile.\nThis creates both User and Author profile in one transaction."
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Registrasi berhasil. Silakan login dengan email dan password Anda.'
                  data:
                    user_id: 1
                    email: author@example.com
                    author_id: 1
                    status: pending_verification
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Registrasi berhasil. Silakan login dengan email dan password Anda.'
                  data:
                    type: object
                    properties:
                      user_id:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: author@example.com
                      author_id:
                        type: integer
                        example: 1
                      status:
                        type: string
                        example: pending_verification
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Full name'
                  example: architecto
                username:
                  type: string
                  description: 'Unique username (min 3 chars)'
                  example: architecto
                email:
                  type: string
                  description: 'Valid email (unique)'
                  example: gbailey@example.net
                password:
                  type: string
                  description: 'Min 8 chars, must be confirmed'
                  example: '|]|{+-'
                phone:
                  type: string
                  description: 'Phone/WhatsApp number'
                  example: architecto
                bio:
                  type: string
                  description: 'nullable Author biography'
                  example: architecto
                bank_name:
                  type: string
                  description: 'Bank name for royalty payments'
                  example: architecto
                bank_account:
                  type: string
                  description: 'Bank account number'
                  example: architecto
                bank_account_name:
                  type: string
                  description: 'Bank account holder name'
                  example: architecto
              required:
                - name
                - username
                - email
                - password
                - phone
                - bank_name
                - bank_account
                - bank_account_name
      security: []
  /api/v1/authors/check-username:
    get:
      summary: 'GET /api/v1/authors/check-username'
