      summary: "GET /api/v1/auth/google/callback\nHandle the callback from Google, create/login user, return token."
      operationId: gETapiv1authgooglecallbackHandleTheCallbackFromGoogleCreateloginUserReturnToken
      description: "SECURITY FIXES:\n1. Prevent account takeover (email enumeration)\n2. Use fragment (#) instead of query (?) for token\n3. Remove stateless() for CSRF protection"
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
